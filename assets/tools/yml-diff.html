<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAML Diff 工具</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --card2: #1f232c;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #8a93a3;
    --accent: #4f8cff;
    --accent2: #2dd4bf;
    --warn: #f59e0b;
    --danger: #ef4444;
    --ok: #22c55e;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .card h2 { font-size: 16px; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
  textarea {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    resize: vertical;
    min-height: 200px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .row > div { flex: 1; min-width: 200px; }
  button {
    background: var(--accent);
    color: #fff; border: none; border-radius: 10px;
    padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity .15s;
  }
  button:hover { opacity: .9; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.ghost { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  button.swap { background: var(--card2); color: var(--text); border: 1px solid var(--border); padding: 10px 14px; }
  button.swap:hover { border-color: var(--accent); color: var(--accent); }
  .mt { margin-top: 16px; }
  .err { color: var(--danger); font-size: 12px; margin-top: 6px; }
  .err-box {
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.4);
    color: #fca5a5;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .err-box.show { display: block; }

  /* Input row with swap */
  .input-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: flex-end;
  }
  @media (max-width: 700px) {
    .input-row { grid-template-columns: 1fr; }
    .swap-wrap { order: -1; justify-content: center; }
  }
  .swap-wrap { display: flex; align-items: center; padding-bottom: 18px; }

  /* Action buttons row */
  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* Result section */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: none;
  }
  .result-card.show { display: block; }

  /* Summary */
  .summary {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }
  .stat.added { color: var(--green); }
  .stat.removed { color: var(--red); }
  .stat.changed { color: var(--warn); }
  .stat-badge {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
  }
  .stat.added .stat-badge { background: rgba(34,197,94,.15); }
  .stat.removed .stat-badge { background: rgba(239,68,68,.15); }
  .stat.changed .stat-badge { background: rgba(245,158,11,.15); }

  /* Diff output */
  .diff-view {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .diff-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .diff-content {
    max-height: 500px;
    overflow-y: auto;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    line-height: 1.6;
  }
  .diff-line {
    display: flex;
    padding: 2px 12px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .diff-line.added { background: rgba(34,197,94,.15); color: var(--green); }
  .diff-line.removed { background: rgba(239,68,68,.15); color: var(--red); }
  .diff-line.changed { background: rgba(245,158,11,.15); color: var(--warn); }
  .diff-line.context { color: var(--muted); }
  .diff-line.collapsed {
    background: var(--card);
    color: var(--muted);
    font-style: italic;
    cursor: pointer;
    user-select: none;
  }
  .diff-line.collapsed:hover { color: var(--text); }
  .diff-prefix { width: 20px; flex-shrink: 0; }
  .diff-path { color: var(--accent2); margin-right: 8px; font-size: 12px; }
  .diff-empty {
    padding: 40px;
    text-align: center;
    color: var(--muted);
  }

  /* Document indicator */
  .doc-indicator {
    display: inline-block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    color: var(--accent);
    margin-right: 8px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>YAML Diff 工具</h1>
  <div class="sub">比较两个 YAML 文档的差异，支持嵌套结构与多文档</div>

  <div class="card">
    <h2>输入</h2>
    <div class="input-row">
      <div>
        <label>左侧 YAML（原始）</label>
        <textarea id="leftYaml" placeholder="输入或粘贴 YAML..."></textarea>
      </div>
      <div class="swap-wrap">
        <button class="swap" id="swapBtn" title="交换左右">⇄</button>
      </div>
      <div>
        <label>右侧 YAML（比较目标）</label>
        <textarea id="rightYaml" placeholder="输入或粘贴 YAML..."></textarea>
      </div>
    </div>

    <div class="err-box" id="leftErr"></div>
    <div class="err-box" id="rightErr"></div>

    <div class="action-row mt">
      <button id="compareBtn">比较</button>
      <button class="ghost" id="formatLeftBtn">格式化左侧</button>
      <button class="ghost" id="formatRightBtn">格式化右侧</button>
      <button class="ghost" id="copyDiffBtn">复制 Diff</button>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <h2>比较结果</h2>
    <div class="summary" id="summary"></div>
    <div class="diff-view">
      <div class="diff-header">
        <span>详细差异</span>
        <span id="diffCount"></span>
      </div>
      <div class="diff-content" id="diffContent"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════════
   DOM refs
═══════════════════════════════════════════════ */
const leftYaml    = document.getElementById('leftYaml');
const rightYaml   = document.getElementById('rightYaml');
const leftErr     = document.getElementById('leftErr');
const rightErr    = document.getElementById('rightErr');
const compareBtn  = document.getElementById('compareBtn');
const swapBtn     = document.getElementById('swapBtn');
const formatLeft  = document.getElementById('formatLeftBtn');
const formatRight = document.getElementById('formatRightBtn');
const copyDiffBtn = document.getElementById('copyDiffBtn');
const resultCard  = document.getElementById('resultCard');
const summaryEl  = document.getElementById('summary');
const diffContent= document.getElementById('diffContent');
const diffCountEl= document.getElementById('diffCount');

let lastDiffText = '';

/* ═══════════════════════════════════════════════
   YAML validation with multi-document support
═══════════════════════════════════════════════ */
function validateYaml(text, errEl) {
  if (!text.trim()) {
    errEl.classList.remove('show');
    errEl.textContent = '';
    return { docs: [], error: null };
  }
  try {
    const docs = jsyaml.loadAll(text);
    errEl.classList.remove('show');
    errEl.textContent = '';
    return { docs, error: null };
  } catch (e) {
    const displayMsg = e.message || String(e);
    errEl.innerHTML = `<strong>YAML 解析错误</strong><br>${escHtml(displayMsg)}`;
    errEl.classList.add('show');
    return { docs: [], error: e };
  }
}

/* ═══════════════════════════════════════════════
   Format YAML
═══════════════════════════════════════════════ */
function formatYaml(text) {
  try {
    const docs = jsyaml.loadAll(text);
    return docs.map(doc => jsyaml.dump(doc, { indent: 2, lineWidth: -1 })).join('---\n');
  } catch {
    return text;
  }
}

formatLeft.addEventListener('click', () => {
  leftYaml.value = formatYaml(leftYaml.value);
});

formatRight.addEventListener('click', () => {
  rightYaml.value = formatYaml(rightYaml.value);
});

/* ═══════════════════════════════════════════════
   Swap
═══════════════════════════════════════════════ */
swapBtn.addEventListener('click', () => {
  const tmp = leftYaml.value;
  leftYaml.value = rightYaml.value;
  rightYaml.value = tmp;
});

/* ═══════════════════════════════════════════════
   Core diff algorithm
═══════════════════════════════════════════════ */
function jsonDiff(left, right, path = 'root', docIndex = 0) {
  const result = [];

  // Handle primitives and type differences
  if (left === right) {
    return result; // No difference
  }

  const leftType = getType(left);
  const rightType = getType(right);

  // Type mismatch
  if (leftType !== rightType) {
    result.push({ type: 'changed', path, docIndex, leftVal: left, rightVal: right });
    return result;
  }

  // Both are null
  if (left === null) {
    return result;
  }

  // Arrays
  if (Array.isArray(left)) {
    const maxLen = Math.max(left.length, right.length);
    for (let i = 0; i < maxLen; i++) {
      const arrPath = `${path}[${i}]`;
      if (i >= left.length) {
        // Added in right
        collectAllAdded(right[i], arrPath, result, docIndex);
      } else if (i >= right.length) {
        // Removed from left
        collectAllRemoved(left[i], arrPath, result, docIndex);
      } else {
        result.push(...jsonDiff(left[i], right[i], arrPath, docIndex));
      }
    }
    return result;
  }

  // Objects
  if (leftType === 'object') {
    const leftKeys = Object.keys(left);
    const rightKeys = Object.keys(right);
    const allKeys = new Set([...leftKeys, ...rightKeys]);

    for (const key of allKeys) {
      const objPath = `${path}.${key}`;
      const leftHas = key in left;
      const rightHas = key in right;

      if (leftHas && !rightHas) {
        collectAllRemoved(left[key], objPath, result, docIndex);
      } else if (!leftHas && rightHas) {
        collectAllAdded(right[key], objPath, result, docIndex);
      } else {
        result.push(...jsonDiff(left[key], right[key], objPath, docIndex));
      }
    }
    return result;
  }

  // Primitives (different values)
  result.push({ type: 'changed', path, docIndex, leftVal: left, rightVal: right });
  return result;
}

function getType(val) {
  if (val === null) return 'null';
  if (Array.isArray(val)) return 'array';
  return typeof val;
}

function collectAllRemoved(val, path, result, docIndex) {
  if (val === null || typeof val !== 'object') {
    result.push({ type: 'removed', path, docIndex, leftVal: val, rightVal: undefined });
    return;
  }
  if (Array.isArray(val)) {
    result.push({ type: 'removed', path, docIndex, leftVal: val, rightVal: undefined });
    return;
  }
  for (const key of Object.keys(val)) {
    collectAllRemoved(val[key], `${path}.${key}`, result, docIndex);
  }
}

function collectAllAdded(val, path, result, docIndex) {
  if (val === null || typeof val !== 'object') {
    result.push({ type: 'added', path, docIndex, leftVal: undefined, rightVal: val });
    return;
  }
  if (Array.isArray(val)) {
    result.push({ type: 'added', path, docIndex, leftVal: undefined, rightVal: val });
    return;
  }
  for (const key of Object.keys(val)) {
    collectAllAdded(val[key], `${path}.${key}`, result, docIndex);
  }
}

/* ═══════════════════════════════════════════════
   Render diff
═══════════════════════════════════════════════ */
function renderDiff(diffs) {
  const added = diffs.filter(d => d.type === 'added');
  const removed = diffs.filter(d => d.type === 'removed');
  const changed = diffs.filter(d => d.type === 'changed');

  // Summary
  summaryEl.innerHTML = `
    <div class="stat added"><span class="stat-badge">+${added.length}</span> 添加</div>
    <div class="stat removed"><span class="stat-badge">-${removed.length}</span> 删除</div>
    <div class="stat changed"><span class="stat-badge">~${changed.length}</span> 修改</div>
  `;

  if (diffs.length === 0) {
    diffContent.innerHTML = '<div class="diff-empty">两个 YAML 文档完全相同</div>';
    diffCountEl.textContent = '无差异';
    return;
  }

  diffCountEl.textContent = `${diffs.length} 处差异`;

  // Build diff lines
  let html = '';

  // Group by type and render
  if (added.length > 0) {
    html += `<div class="diff-line context" style="border-bottom:1px solid var(--border);font-weight:600;">── 添加（右侧有，左侧无）──</div>`;
    for (const d of added) {
      html += diffLine('added', d.path, formatVal(d.rightVal), d.docIndex);
    }
  }

  if (removed.length > 0) {
    html += `<div class="diff-line context" style="border-bottom:1px solid var(--border);font-weight:600;">── 删除（左侧有，右侧无）──</div>`;
    for (const d of removed) {
      html += diffLine('removed', d.path, formatVal(d.leftVal), d.docIndex);
    }
  }

  if (changed.length > 0) {
    html += `<div class="diff-line context" style="border-bottom:1px solid var(--border);font-weight:600;">── 修改（值不同）──</div>`;
    for (const d of changed) {
      html += diffLine('changed', d.path, `${formatVal(d.leftVal)} → ${formatVal(d.rightVal)}`, d.docIndex);
    }
  }

  diffContent.innerHTML = html;
}

function diffLine(type, path, value, docIndex) {
  const prefix = type === 'added' ? '+' : type === 'removed' ? '-' : '~';
  const docLabel = docIndex > 0 ? `<span class="doc-indicator">文档 ${docIndex + 1}</span>` : '';
  return `<div class="diff-line ${type}">
    <span class="diff-prefix">${prefix}</span>
    ${docLabel}
    <span class="diff-path">${escHtml(path)}</span>
    <span>${escHtml(value)}</span>
  </div>`;
}

function formatVal(val) {
  if (val === undefined) return '(undefined)';
  if (val === null) return 'null';
  if (typeof val === 'string') return `"${val}"`;
  if (typeof val === 'object') {
    try {
      return jsyaml.dump(val, { lineWidth: -1 }).trim();
    } catch {
      return JSON.stringify(val);
    }
  }
  return String(val);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ═══════════════════════════════════════════════
   Copy diff
═══════════════════════════════════════════════ */
copyDiffBtn.addEventListener('click', async () => {
  if (!lastDiffText) return;
  try {
    await navigator.clipboard.writeText(lastDiffText);
    const orig = copyDiffBtn.textContent;
    copyDiffBtn.textContent = '已复制';
    setTimeout(() => copyDiffBtn.textContent = orig, 1500);
  } catch {
    alert('复制失败，请手动复制');
  }
});

/* ═══════════════════════════════════════════════
   Compare button
═══════════════════════════════════════════════ */
compareBtn.addEventListener('click', () => {
  leftErr.classList.remove('show');
  rightErr.classList.remove('show');

  const leftResult = validateYaml(leftYaml.value, leftErr);
  if (leftYaml.value.trim() && leftResult.error) return;

  const rightResult = validateYaml(rightYaml.value, rightErr);
  if (rightYaml.value.trim() && rightResult.error) return;

  // If both empty
  if (!leftYaml.value.trim() && !rightYaml.value.trim()) {
    resultCard.classList.remove('show');
    return;
  }

  // Compare documents
  const diffs = compareDocuments(leftResult.docs, rightResult.docs);

  // Build text for copy
  lastDiffText = buildDiffText(diffs);

  renderDiff(diffs);
  resultCard.classList.add('show');
});

function compareDocuments(leftDocs, rightDocs) {
  const diffs = [];
  const maxLen = Math.max(leftDocs.length, rightDocs.length);

  for (let i = 0; i < maxLen; i++) {
    const leftDoc = leftDocs[i];
    const rightDoc = rightDocs[i];
    const docIndex = i;

    if (i >= leftDocs.length) {
      // Entire document added
      collectAllAdded(rightDoc, `doc[${i}]`, diffs, docIndex);
    } else if (i >= rightDocs.length) {
      // Entire document removed
      collectAllRemoved(leftDoc, `doc[${i}]`, diffs, docIndex);
    } else {
      // Compare documents
      diffs.push(...jsonDiff(leftDoc, rightDoc, 'root', docIndex));
    }
  }

  return diffs;
}

function countVals(obj) {
  if (obj === null || typeof obj !== 'object') return 1;
  if (Array.isArray(obj)) return obj.length;
  return Object.keys(obj).length;
}

function buildDiffText(diffs) {
  let text = '';
  for (const d of diffs) {
    const prefix = d.type === 'added' ? '+' : d.type === 'removed' ? '-' : '~';
    const docLabel = d.docIndex > 0 ? `[文档 ${d.docIndex + 1}] ` : '';
    text += `${prefix} ${docLabel}${d.path}: `;
    if (d.type === 'added') {
      text += formatVal(d.rightVal);
    } else if (d.type === 'removed') {
      text += formatVal(d.leftVal);
    } else {
      text += `${formatVal(d.leftVal)} → ${formatVal(d.rightVal)}`;
    }
    text += '\n';
  }
  return text || '两个 YAML 文档完全相同';
}

/* ═══════════════════════════════════════════════
   Input validation on change
═══════════════════════════════════════════════ */
leftYaml.addEventListener('input', () => {
  if (leftYaml.value.trim()) validateYaml(leftYaml.value, leftErr);
  else leftErr.classList.remove('show');
});

rightYaml.addEventListener('input', () => {
  if (rightYaml.value.trim()) validateYaml(rightYaml.value, rightErr);
  else rightErr.classList.remove('show');
});
</script>
</body>
</html>
